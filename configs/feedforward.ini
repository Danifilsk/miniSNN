[run]
run_name = feedforward_demo

[network]
topology = feedforward
neurons = 30
inhibitory_fraction = 0.10
connection_probability = 0.50
seed = 1
delay = 1
max_synaptic_delay = 8

[connectivity]
allow_self_connections = false
allow_inh_to_inh = true

[weights]
excitatory_weight = 150.0
inhibitory_weight = -200.0

[input]
source_count = 5
input_current = 20.0

[simulation]
steps = 1000
dt = 0.1
tau = 20.0
v_rest = -65.0
v_reset = -65.0
v_threshold = -50.0
resistance = 1.0
synaptic_decay = 0.95

[topology_options]
small_world_neighbors = 4
small_world_rewire_probability = 0.10
feedforward_layers = 3

[recording]
record_neuron = 0
