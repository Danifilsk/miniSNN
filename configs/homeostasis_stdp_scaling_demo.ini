[run]
run_name = homeostasis_stdp_scaling_demo

[network]
topology = chain
neurons = 2
inhibitory_fraction = 0.0
connection_probability = 1.0
seed = 1
delay = 1
max_synaptic_delay = 8

[connectivity]
allow_self_connections = false
allow_inh_to_inh = true

[weights]
excitatory_weight = 150.0
inhibitory_weight = -250.0

[input]
source_count = 1
input_current = 20.0

[simulation]
steps = 2000
dt = 0.1
tau = 20.0
v_rest = -65.0
v_reset = -65.0
v_threshold = -50.0
resistance = 1.0
synaptic_decay = 0.95

[recording]
record_neuron = 1

[output]
auto_unique_run = false
history_enabled = false

[diagnostics]
level = basic
time_bin_steps = 10
burst_z_threshold = 2.0
min_burst_steps = 1
isi_min_spikes = 4
correlation_sample_size = 128
neuron_sample_limit = 1000
sample_stride = 1

[plasticity]
enabled = true
rule = stdp_pair_trace
a_plus = 1.0
a_minus = 1.05
tau_plus = 20.0
tau_minus = 20.0
trace_increment = 1.0
weight_min = 0.0
weight_max = 300.0
record_weights = true
record_history = true
record_interval_steps = 10
record_connection_limit = 256

[homeostasis]
enabled = true
intrinsic_enabled = false
target_rate = 0.05
rate_tau = 100.0
update_interval_steps = 10
threshold_eta = 0.05
threshold_min = -60.0
threshold_max = -40.0
synaptic_scaling_enabled = true
scaling_target_mode = initial_incoming_sum
scaling_eta = 0.10
scaling_min_factor = 0.50
scaling_max_factor = 2.0
scaling_weight_min = 0.0
scaling_weight_max = 1000.0
inhibitory_gain_enabled = false
inhibitory_gain_initial = 1.0
inhibitory_gain_eta = 0.05
inhibitory_gain_min = 0.25
inhibitory_gain_max = 4.0
record_history = true
record_interval_steps = 10
record_neuron_limit = 256
