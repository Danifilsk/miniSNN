[run]
run_name = evolution_homeostasis_base

[network]
topology = chain
neurons = 1
inhibitory_fraction = 0.0
connection_probability = 1.0
seed = 11
delay = 1
max_synaptic_delay = 8

[connectivity]
allow_self_connections = false
allow_inh_to_inh = true

[weights]
excitatory_weight = 200.0
inhibitory_weight = -250.0

[input]
source_count = 1
input_current = 10.0

[simulation]
steps = 1000
dt = 0.1
tau = 20.0
v_rest = -65.0
v_reset = -65.0
v_threshold = -50.0
resistance = 1.0
synaptic_decay = 0.95

[recording]
record_neuron = 0

[output]
