[run]
run_name = reward_delayed_demo

[network]
topology = chain
neurons = 2
inhibitory_fraction = 0.0
connection_probability = 1.0
seed = 1
delay = 1
max_synaptic_delay = 8

[connectivity]
allow_self_connections = false
allow_inh_to_inh = true

[weights]
excitatory_weight = 150.0
inhibitory_weight = -250.0

[input]
source_count = 1
input_current = 20.0

[simulation]
steps = 1200
dt = 0.1
tau = 20.0
v_rest = -65.0
v_reset = -65.0
v_threshold = -50.0
resistance = 1.0
synaptic_decay = 0.95

[recording]
record_neuron = 1

[output]
auto_unique_run = false
history_enabled = false

[diagnostics]
level = basic
time_bin_steps = 10
burst_z_threshold = 2.0
min_burst_steps = 1
isi_min_spikes = 4
correlation_sample_size = 128
neuron_sample_limit = 1000
sample_stride = 1

[plasticity]
enabled = true
rule = stdp_pair_trace
learning_mode = reward_modulated_stdp
a_plus = 1.0
a_minus = 1.05
tau_plus = 20.0
tau_minus = 20.0
trace_increment = 1.0
weight_min = 0.0
weight_max = 300.0
record_weights = true
record_history = true
record_interval_steps = 10
record_connection_limit = 256

[reward]
enabled = true
mode = rstdp
learning_rate = 1.0
eligibility_tau = 20.0
eligibility_min = -200.0
eligibility_max = 200.0
reward_min = -1.0
reward_max = 1.0
clip_reward = true
record_history = true
record_interval_steps = 10
record_connection_limit = 256

[reward_events]
event_0 = 1000,1.0
