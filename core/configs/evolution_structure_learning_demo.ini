[evolution]
enabled = true
experiment_name = evolution_structure_learning_demo
base_scenario = configs/evolution_structure_learning_base.ini
population_size = 6
generations = 4
elite_count = 1
selection = tournament
tournament_size = 2
crossover = uniform
crossover_rate = 0.8
mutation = uniform_delta
mutation_rate = 0.25
mutation_scale = 0.10
initialization = baseline_plus_mutation
initialization_scale = 0.15
evolution_seed = 44002
evaluation_replicates = 1
evaluation_seed_base = 52000
replicate_std_penalty = 0
checkpoint_interval_generations = 1
save_all_genomes = true
save_best_run = true
auto_unique_run = false
history_enabled = true
genome_mode = structural_connections

[genome]
evolve_exc_weights = true
exc_weight_min = 0
exc_weight_max = 500
evolve_inh_magnitudes = false
inh_magnitude_min = 0
inh_magnitude_max = 500

[structure]
enabled = true
allow_add = true
allow_remove = true
allow_rewire = true
evolve_delays = true
add_rate = 0.30
remove_rate = 0.15
rewire_rate = 0.15
delay_mutation_rate = 0.10
max_structural_mutations_per_child = 2
min_connections = 2
max_connections = 10
allow_self_connections = false
allow_inh_to_inh = true
delay_min = 1
delay_max = 8
delay_mutation_max_delta = 2
new_exc_weight_min = 20.0
new_exc_weight_max = 200.0
new_inh_magnitude_min = 20.0
new_inh_magnitude_max = 200.0
complexity_penalty = 0.01
preserve_required_reachability = true
required_input_neurons = 0,1
required_output_neurons = 4

[fitness]
term_0 = neuron_spikes:4,target,3,2,1
term_1 = activity_total_spikes,minimize,40,40,0.1
