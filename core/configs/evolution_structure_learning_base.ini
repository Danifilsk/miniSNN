[run]
run_name = evolution_structure_learning_base

[network]
topology = chain
neurons = 5
inhibitory_fraction = 0.0
connection_probability = 1.0
seed = 9
delay = 1
max_synaptic_delay = 8

[connectivity]
allow_self_connections = false
allow_inh_to_inh = true

[weights]
excitatory_weight = 120.0
inhibitory_weight = -250.0

[input]
source_count = 2
input_current = 20.0

[simulation]
steps = 400
dt = 0.1
tau = 20.0
v_rest = -65.0
v_reset = -65.0
v_threshold = -50.0
resistance = 1.0
synaptic_decay = 0.95

[recording]
record_neuron = 4

[output]
auto_unique_run = false
history_enabled = false

[diagnostics]
level = off

[plasticity]
enabled = true
rule = stdp_pair_trace
learning_mode = direct_stdp
a_plus = 1.0
a_minus = 0.5
tau_plus = 20.0
tau_minus = 20.0
trace_increment = 1.0
weight_min = 0.0
weight_max = 500.0
record_history = false
record_interval_steps = 100

[structural_plasticity]
enabled = true
maintenance_interval_steps = 50
grace_period_steps = 100
pruning_enabled = false
prune_weight_threshold = 0.5
prune_activity_threshold = 0.001
max_prunes_per_interval = 1
growth_enabled = true
growth_candidate_count = 16
growth_score_threshold = 0.0
max_growth_per_interval = 1
growth_seed = 99001
new_exc_weight = 20.0
new_inh_magnitude = 20.0
new_delay = 1
min_connections = 2
max_connections = 10
record_history = true
record_interval_steps = 50
