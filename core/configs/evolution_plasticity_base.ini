[run]
run_name = evolution_plasticity_base

[network]
topology = chain
neurons = 2
inhibitory_fraction = 0.0
connection_probability = 1.0
seed = 17
delay = 1
max_synaptic_delay = 8

[connectivity]
allow_self_connections = false
allow_inh_to_inh = true

[weights]
excitatory_weight = 150.0
inhibitory_weight = -250.0

[input]
source_count = 1
input_current = 20.0

[simulation]
steps = 800
dt = 0.1
tau = 20.0
v_rest = -65.0
v_reset = -65.0
v_threshold = -50.0
resistance = 1.0
synaptic_decay = 0.95

[recording]
record_neuron = 1

[output]
auto_unique_run = false
history_enabled = false

[diagnostics]
level = basic

[plasticity]
enabled = true
rule = stdp_pair_trace
learning_mode = direct_stdp
a_plus = 1.0
a_minus = 1.05
tau_plus = 20.0
tau_minus = 20.0
trace_increment = 1.0
weight_min = 0.0
weight_max = 500.0
record_weights = false
record_history = false
record_interval_steps = 10
record_connection_limit = 64

