[run]
run_name = sensor_encoding_demo

[network]
neurons = 6
model = lif

[sensor_encoder]
brain_steps_per_tick = 4
rate_unit = pulses_per_neural_step

[sensors]
signal_a = 0.0,1.0,0.0
signal_b = -1.0,1.0,0.0
signal_c = 0.0,1.0,0.0

[mappings]
signal_a = linear_current,0,2,80.0,0.0
signal_b = bipolar_current,2,2,60.0,0.0
signal_c = deterministic_rate,4,2,90.0,0.5,0
