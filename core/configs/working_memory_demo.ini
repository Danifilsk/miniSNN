# Demonstrador C6.1: duas assembleias recorrentes EXC com inibicao cruzada.

[run]
run_name = working_memory_demo

[network]
topology = working_memory
neurons = 6
inhibitory_fraction = 0.3333333333333333
connection_probability = 1.0
seed = 17
delay = 1
max_synaptic_delay = 8

[connectivity]
allow_self_connections = true
allow_inh_to_inh = false

[weights]
excitatory_weight = 200.0
inhibitory_weight = -300.0

[input]
source_count = 1
input_current = 400.0

[simulation]
steps = 120
dt = 0.1
tau = 20.0
v_rest = -65.0
v_reset = -65.0
v_threshold = -50.0
resistance = 1.0
synaptic_decay = 0.98

[recording]
record_neuron = 0

[diagnostics]
level = basic
time_bin_steps = 10
burst_z_threshold = 2.0
min_burst_steps = 1
isi_min_spikes = 4
correlation_sample_size = 32
neuron_sample_limit = 4
sample_stride = 1

[working_memory]
enabled = true
trials = 20
cue_steps = 20
delay_steps = 40
probe_steps = 20
cue_pattern = alternating
cue_start = 0
cue_group_size = 2
readout_start = 0
readout_count = 2
readout_group_size = 2
seed = 2026
reset_between_trials = true
recall_tolerance = 0.25
recall_threshold = 0.75
