# Demonstrador C6.3 contextual: A>B>C>D e X>Y>C>E.
# C e compartilhado; a previsao correta depende do prefixo anterior.

[run]
run_name = sequence_prediction_context_demo

[network]
topology = sequence_prediction
neurons = 24
inhibitory_fraction = 0.0
connection_probability = 1.0
seed = 1234
delay = 1
max_synaptic_delay = 8

[connectivity]
allow_self_connections = false
allow_inh_to_inh = false

[weights]
excitatory_weight = 200.0
inhibitory_weight = -250.0

[input]
source_count = 1
input_current = 4000.0

[simulation]
steps = 120
dt = 0.1
tau = 20.0
v_rest = -65.0
v_reset = -65.0
v_threshold = -50.0
resistance = 1.0
synaptic_decay = 0.95

[recording]
record_neuron = 0

[plasticity]
enabled = true
rule = stdp_pair_trace
learning_mode = direct_stdp
a_plus = 0.5
a_minus = 0.525
tau_plus = 1.0
tau_minus = 1.0
trace_increment = 1.0
weight_min = 0.0
weight_max = 200.0

[sequence_prediction]
enabled = true
sequence_count = 2
sequence_length = 4
training_epochs = 30
pattern_steps = 5
inter_pattern_gap_steps = 4
initial_prediction_weight = 1.0
prefix_length = 3
prediction_delay_steps = 3
prediction_probe_steps = 16
trial_count = 20
freeze_plasticity_during_evaluation = true
reset_between_sequences = true
seed = 1234
prediction_threshold = 0.30
pattern_mode = contextual
input_start = 0
input_group_size = 2
prediction_start = 16
prediction_group_size = 1
