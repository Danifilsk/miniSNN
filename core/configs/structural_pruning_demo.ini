[run]
run_name = structural_pruning_demo

[network]
topology = all_to_all
neurons = 6
inhibitory_fraction = 0.0
connection_probability = 1.0
seed = 1
delay = 1
max_synaptic_delay = 8

[connectivity]
allow_self_connections = false
allow_inh_to_inh = true

[weights]
excitatory_weight = 0.1
inhibitory_weight = -5.0

[input]
source_count = 1
input_current = 20.0

[simulation]
steps = 20
dt = 0.1
tau = 20.0
v_rest = -65.0
v_reset = -65.0
v_threshold = -50.0
resistance = 1.0
synaptic_decay = 0.95

[recording]
record_neuron = 0

[output]
auto_unique_run = false
history_enabled = false

[diagnostics]
level = off

[structural_plasticity]
enabled = true
maintenance_interval_steps = 2
grace_period_steps = 2
pruning_enabled = true
prune_weight_threshold = 1.0
prune_activity_threshold = 1000000000.0
max_prunes_per_interval = 4
growth_enabled = false
growth_candidate_count = 16
growth_score_threshold = 0.01
max_growth_per_interval = 1
growth_seed = 9001
new_exc_weight = 5.0
new_inh_magnitude = 5.0
new_delay = 1
min_connections = 10
max_connections = 30
record_history = true
record_interval_steps = 2
