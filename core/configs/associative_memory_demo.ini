# Demonstrador C6.2: dois pares cue-alvo com treino STDP e recall parcial.

[run]
run_name = associative_memory_demo

[network]
topology = associative_memory
neurons = 8
inhibitory_fraction = 0.0
connection_probability = 1.0
seed = 1234
delay = 1
max_synaptic_delay = 8

[connectivity]
allow_self_connections = true
allow_inh_to_inh = false

[weights]
excitatory_weight = 200.0
inhibitory_weight = -250.0

[input]
source_count = 1
input_current = 4000.0

[simulation]
steps = 120
dt = 0.1
tau = 20.0
v_rest = -65.0
v_reset = -65.0
v_threshold = -50.0
resistance = 1.0
synaptic_decay = 0.98

[recording]
record_neuron = 0

[plasticity]
enabled = true
rule = stdp_pair_trace
learning_mode = direct_stdp
a_plus = 0.5
a_minus = 0.525
tau_plus = 20.0
tau_minus = 20.0
trace_increment = 1.0
weight_min = 0.0
weight_max = 200.0

[associative_memory]
enabled = true
pair_count = 2
training_epochs = 20
training_cue_steps = 5
training_gap_steps = 20
initial_association_weight = 1.0
recall_cue_steps = 10
recall_delay_steps = 20
recall_probe_steps = 20
cue_corruption = 0.50
trial_count = 20
reset_between_pairs = true
freeze_plasticity_during_recall = true
seed = 1234
recall_threshold = 0.75
pattern_mode = fixed
cue_start = 0
cue_group_size = 2
target_start = 4
target_group_size = 2
